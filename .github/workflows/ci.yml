name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]
    env:
      # Deterministic, fully-offline test run: no FaceNet weight / LFW downloads.
      QF_FORCE_OFFLINE_EMBEDDER: "1"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install CPU-only PyTorch
        run: |
          python -m pip install --upgrade pip
          pip install torch==2.2.2 torchvision==0.17.2 \
            --index-url https://download.pytorch.org/whl/cpu

      - name: Install project dependencies
        run: pip install -r QuantumFace/requirements.txt

      - name: Run test suite
        run: python -m pytest QuantumFace/tests -q

  docker:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: quantumface:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
